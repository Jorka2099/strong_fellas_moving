{{define "quote"}}
<section id="quote" class="py-16 bg-gray-50">
  <div class="container mx-auto px-4 max-w-4xl">
    <div class="bg-white rounded-2xl shadow-xl p-8 md:p-12 border border-gray-100">
      
      <div class="text-center max-w-2xl mx-auto mb-10">
        <h2 class="text-3xl font-bold text-gray-900 mb-4">Get a Free Moving Estimate</h2>
        <p class="text-gray-600">Fill out the form below, and our team will get back to you within 30 minutes with an accurate quote.</p>
      </div>

      <form action="/submit-quote" method="POST" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Your Name</label>
            <input type="text" name="name" required placeholder="John Doe" 
                   class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#c25e52] focus:border-[#c25e52] outline-none transition-all">
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Phone Number</label>
            <input type="tel" name="phone" required placeholder="(403) 123-4567" 
                   class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#c25e52] focus:border-[#c25e52] outline-none transition-all">
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Moving From (Address / City)</label>
            <input type="text" name="from" required placeholder="Calgary SE" 
                   class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#c25e52] focus:border-[#c25e52] outline-none transition-all">
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Moving To (Address / City)</label>
            <input type="text" name="to" required placeholder="Airdrie" 
                   class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#c25e52] focus:border-[#c25e52] outline-none transition-all">
          </div>

        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Details (Size of home, big items, etc.)</label>
          <textarea name="details" rows="4" placeholder="e.g., 2 bedroom apartment, need help with a heavy sofa and a fridge..." 
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#c25e52] focus:border-[#c25e52] outline-none transition-all"></textarea>
        </div>

        <div class="text-center pt-4">
          <button type="submit" class="bg-[#c25e52] hover:opacity-90 text-white font-bold text-lg px-12 py-4 rounded-lg shadow-md transition-all w-full md:w-auto">
            Send Request
          </button>
        </div>
      </form>

    </div>
  </div>
</section>
{{end}}
