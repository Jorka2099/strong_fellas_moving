{{define "login.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Strong Fellas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Admin Access</h2>
        
        {{if .}}
        <div class="bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-sm text-center">
            {{.}}
        </div>
        {{end}}

        <form action="/admin/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Password</label>
                <input type="password" name="password" required autofocus
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>
            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg transition-all shadow">
                Sign In
            </button>
        </form>
    </div>
</body>
</html>
{{end}}
