services: 
  postgres_db:
    image: postgres:15-alpine
    container_name: strong_fellas_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER} 
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} 
      POSTGRES_DB: ${POSTGRES_DBNAME} 
    ports:   
      - "5433:5432"
    volumes:
      - pgdata_final:/var/lib/postgresql/data

volumes:
  pgdata_final: