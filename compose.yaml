services: 
  postgres_db:
    image: postgres:15-alpine
    container_name: strong_fellas_postgres
    restart: always
    environment:
      POSTGRES_USER: strong_fella_admin
      POSTGRES_PASSWORD: final_password_228
      POSTGRES_DB: strong_fellas_db
    ports:   
      - "5433:5432"
    volumes:
      - pgdata_final:/var/lib/postgresql/data

volumes:
  pgdata_final: